<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Knolife V2</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
    input[type=range]{width:100%;accent-color:#3B82F6;cursor:pointer}
    ::-webkit-scrollbar{width:0}
    *{-webkit-font-smoothing:antialiased}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, LineChart, Line, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

const DATA = [
  { date:"14/6", weight:115.0, sleep:6, energy:6, steps:6858, mood:6, stress:7, kcal:1775 },
  { date:"15/6", weight:114.6, sleep:4, energy:4, steps:6766, mood:5, stress:6, kcal:1750 },
  { date:"16/6", weight:113.3, sleep:5, energy:6, steps:8696, mood:6, stress:5, kcal:1800 },
  { date:"17/6", weight:112.3, sleep:6, energy:6, steps:8664, mood:7, stress:4, kcal:1775 },
  { date:"18/6", weight:111.9, sleep:7, energy:7, steps:8628, mood:7, stress:4, kcal:1775 },
  { date:"19/6", weight:112.0, sleep:4, energy:4, steps:6700, mood:4, stress:8, kcal:1900 },
  { date:"20/6", weight:112.3, sleep:4, energy:6, steps:3900, mood:5, stress:7, kcal:2100 },
  { date:"21/6", weight:112.9, sleep:7, energy:6, steps:1600, mood:6, stress:6, kcal:2300 },
  { date:"22/6", weight:113.5, sleep:7, energy:6, steps:6285, mood:6, stress:5, kcal:1775 },
  { date:"23/6", weight:113.2, sleep:7, energy:6, steps:11803, mood:7, stress:4, kcal:1800 },
  { date:"24/6", weight:113.1, sleep:6, energy:6, steps:3227, mood:7, stress:4, kcal:1775 },
  { date:"25/6", weight:113.1, sleep:7, energy:7, steps:5658, mood:7, stress:3, kcal:2220 },
  { date:"26/6", weight:112.8, sleep:4, energy:5, steps:7032, mood:6, stress:5, kcal:1775 },
  { date:"27/6", weight:112.4, sleep:5, energy:5, steps:8165, mood:6, stress:4, kcal:2127 },
  { date:"28/6", weight:112.5, sleep:7, energy:7, steps:3564, mood:6, stress:4, kcal:2562 },
  { date:"29/6", weight:111.8, sleep:7, energy:6, steps:0,    mood:6, stress:3, kcal:0 },
];

const MILESTONES = [115,110,105,100,95,90,85];
const START = 115, TARGET = 85, STEP_GOAL = 7000;
const latest = DATA[DATA.length-1];
const totalLost = +(START - latest.weight).toFixed(1);
const pct = Math.min(100, ((START - latest.weight)/(START-TARGET))*100).toFixed(0);

function rollingAvg(n=7){
  return DATA.map((d,i)=>{
    const sl = DATA.slice(Math.max(0,i-n+1),i+1);
    return {...d, avg: +(sl.reduce((a,x)=>a+x.weight,0)/sl.length).toFixed(2)};
  });
}

const CTip = ({active,payload,label})=>{
  if(!active||!payload?.length) return null;
  return <div style={{background:"#111",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 12px"}}>
    <p style={{color:"#8E8E93",fontSize:11,marginBottom:4}}>{label}</p>
    {payload.map((p,i)=><p key={i} style={{color:p.color,fontSize:12,margin:0}}>{p.name}: {p.value}</p>)}
  </div>;
};

function Ring({pct,size=80,stroke=5,color="#3B82F6"}){
  const r=(size-stroke)/2, circ=2*Math.PI*r;
  const [off,setOff]=useState(circ);
  useEffect(()=>{setTimeout(()=>setOff(circ-(Math.min(100,pct)/100)*circ),400);},[pct,circ]);
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
      strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
      style={{transition:"stroke-dashoffset 1.4s cubic-bezier(0.34,1.56,0.64,1)"}}/>
  </svg>;
}

function Card({children,delay=0,glow=false}){
  const [vis,setVis]=useState(false);
  const [hov,setHov]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay);return()=>clearTimeout(t);},[delay]);
  return <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
    background:"#0A0A0A", border:`1px solid rgba(255,255,255,${hov?0.1:0.06})`,
    borderRadius:24, padding:20,
    opacity:vis?1:0, transform:vis?(hov?"translateY(-2px)":"translateY(0)"):"translateY(16px)",
    transition:"all 0.4s cubic-bezier(0.34,1.56,0.64,1)",
    boxShadow:glow?"0 0 30px rgba(59,130,246,0.15)":hov?"0 8px 32px rgba(0,0,0,0.5)":"0 2px 12px rgba(0,0,0,0.4)",
    marginBottom:12
  }}>{children}</div>;
}

function Btn({children,onClick,primary=false,small=false}){
  const [p,setP]=useState(false);
  return <button onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)} onMouseLeave={()=>setP(false)} onClick={onClick} style={{
    background:primary?"#3B82F6":"rgba(255,255,255,0.06)",
    border:primary?"none":"1px solid rgba(255,255,255,0.08)",
    borderRadius:50, color:primary?"#fff":"rgba(255,255,255,0.7)",
    padding:small?"6px 14px":"10px 20px", fontSize:small?12:14,
    fontWeight:500, cursor:"pointer",
    transform:p?"scale(0.92)":"scale(1)",
    transition:"all 0.15s cubic-bezier(0.34,1.56,0.64,1)",
    boxShadow:p?"none":primary?"0 4px 16px rgba(59,130,246,0.3)":"none"
  }}>{children}</button>;
}

const COACH_MSGS = [
  "Du viser op for dig selv og Arik, hver eneste dag. Det er det der tæller.",
  "En hård dag ødelægger ikke dit forløb. Trenden er alt.",
  "Du er ikke din diagnose. Du er en mand der stiger op og går en tur for sig selv.",
  "0,5 kg ned om ugen er 26 kg på et år. Tålmodighed er din superkraft.",
  "Kroppen tilpasser sig det du giver den. Du giver den mere end du tror.",
  "Arik ser en far der kæmper for at leve bedre. Det stærkeste forbillede.",
  "Sukkerafvænning og udtrapning er reel kemi. Det aftager. Du vinder.",
];

function useTypewriter(text,speed=22){
  const [d,setD]=useState("");
  const [done,setDone]=useState(false);
  useEffect(()=>{setD("");setDone(false);let i=0;const t=setInterval(()=>{i++;setD(text.slice(0,i));if(i>=text.length){clearInterval(t);setDone(true);}},speed);return()=>clearInterval(t);},[text]);
  return {d,done};
}

function App(){
  const [tab,setTab]=useState("home");
  const [coach,setCoach]=useState(COACH_MSGS[0]);
  const {d:cTyped,done:cDone}=useTypewriter(coach);
  const chartData=rollingAvg();
  const lbl={fontSize:11,color:"#8E8E93",textTransform:"uppercase",letterSpacing:"0.12em",margin:"0 0 14px 0"};
  const tabs=[{id:"home",icon:"⬡",label:"Hjem"},{id:"mad",icon:"🍽",label:"Mad"},{id:"grafer",icon:"◈",label:"Grafer"},{id:"coach",icon:"✦",label:"Coach"},{id:"stats",icon:"◇",label:"Stats"}];
  const nextM=MILESTONES.find(m=>latest.weight>m);
  const kgToNext=nextM?+(latest.weight-nextM).toFixed(1):0;

  return <div style={{background:"#000",minHeight:"100vh",color:"#fff",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif"}}>
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
      <div style={{position:"absolute",top:-100,left:"50%",transform:"translateX(-50%)",width:500,height:400,background:"radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 70%)"}}/>
    </div>
    <div style={{position:"relative",zIndex:1,maxWidth:600,margin:"0 auto",padding:"32px 16px 110px"}}>

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
        <div>
          <p style={{color:"#8E8E93",fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",margin:0}}>Knolife V2</p>
          <h1 style={{fontSize:28,fontWeight:700,margin:"2px 0 0",letterSpacing:"-0.5px"}}>Kno</h1>
        </div>
      </div>

      {/* HOME */}
      {tab==="home" && <div>
        <Card delay={0} glow>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
            <div>
              <p style={lbl}>Nuværende vægt</p>
              <div style={{display:"flex",alignItems:"flex-end",gap:6}}>
                <span style={{fontSize:56,fontWeight:700,letterSpacing:"-2px",lineHeight:1}}>{latest.weight.toFixed(1)}</span>
                <span style={{fontSize:20,color:"#8E8E93",marginBottom:6}}>kg</span>
              </div>
              <span style={{fontSize:13,color:"#22C55E"}}>▼ {totalLost} kg tabt i alt</span>
            </div>
            <div style={{position:"relative",width:80,height:80}}>
              <Ring pct={+pct}/>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:15,fontWeight:700,color:"#3B82F6"}}>{pct}%</span>
                <span style={{fontSize:9,color:"#8E8E93"}}>mod mål</span>
              </div>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:11,color:"#8E8E93"}}>Start: {START} kg</span>
              <span style={{fontSize:11,color:"#8E8E93"}}>Mål: {TARGET} kg</span>
            </div>
            <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#3B82F6,#818cf8)",borderRadius:4,transition:"width 1.4s ease"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
            {[["Tabt",`${totalLost} kg`,"#22C55E"],["Laveste",`${Math.min(...DATA.map(d=>d.weight))} kg`,"#3B82F6"],["BMI",(latest.weight/(1.86*1.86)).toFixed(1),"#fff"],["Dage",DATA.length,"#8E8E93"]].map(([l,v,c])=>(
              <div key={l} style={{textAlign:"center"}}>
                <p style={{fontSize:10,color:"#8E8E93",margin:"0 0 2px",textTransform:"uppercase"}}>{l}</p>
                <p style={{fontSize:16,fontWeight:600,color:c,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>

        <Card delay={80}>
          <p style={lbl}>Vægt over tid</p>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={chartData}>
              <defs>
                <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#3B82F6" stopOpacity={0.25}/>
                  <stop offset="100%" stopColor="#3B82F6" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <XAxis dataKey="date" tick={{fill:"#8E8E93",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis domain={["dataMin - 0.5","dataMax + 0.5"]} tick={{fill:"#8E8E93",fontSize:10}} axisLine={false} tickLine={false} width={32}/>
              <Tooltip content={<CTip/>}/>
              <Area isAnimationActive type="monotone" dataKey="weight" stroke="#3B82F6" strokeWidth={2} fill="url(#wg)" name="Vægt" dot={false} animationDuration={1400}/>
              <Line isAnimationActive type="monotone" dataKey="avg" stroke="#818cf8" strokeWidth={1.5} dot={false} strokeDasharray="4 2" name="7-dags snit" animationDuration={1800}/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>

        {nextM && <Card delay={160}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={lbl}>Næste milestone</p>
              <p style={{fontSize:28,fontWeight:700,margin:0,color:"#3B82F6"}}>{nextM} kg</p>
              <p style={{fontSize:13,color:"#8E8E93",margin:"4px 0 0"}}>{kgToNext} kg tilbage</p>
            </div>
            <div style={{width:56,height:56,borderRadius:"50%",border:"2px solid #3B82F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 0 20px rgba(59,130,246,0.3)"}}>🎯</div>
          </div>
        </Card>}

        <Card delay={240}>
          <p style={lbl}>Milestones</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {MILESTONES.map(m=>{
              const unlocked=latest.weight<=m, next=m===nextM;
              return <div key={m} style={{padding:"6px 14px",borderRadius:50,fontSize:13,fontWeight:500,
                background:unlocked?"rgba(34,197,94,0.12)":next?"rgba(59,130,246,0.12)":"rgba(255,255,255,0.04)",
                border:unlocked?"1px solid rgba(34,197,94,0.3)":next?"1px solid rgba(59,130,246,0.3)":"1px solid rgba(255,255,255,0.06)",
                color:unlocked?"#22C55E":next?"#3B82F6":"#8E8E93"}}>
                {unlocked?"✓ ":""}{m} kg
              </div>;
            })}
          </div>
        </Card>

        <Card delay={320}>
          <p style={lbl}>Seneste check-in · {latest.date}/6</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {[["Søvn",`${latest.sleep}/10`],["Energi",`${latest.energy}/10`],["Skridt",(latest.steps||0).toLocaleString()],["Humør",`${latest.mood}/10`]].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
                <p style={{fontSize:10,color:"#8E8E93",margin:"0 0 3px"}}>{l}</p>
                <p style={{fontSize:15,fontWeight:600,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>
      </div>}

      {/* MAD */}
      {tab==="mad" && <div>
        <Card delay={0} glow>
          <p style={lbl}>Din daglige madplan</p>
          {[
            {emoji:"🥤",name:"Proteinshake",time:"12:00",kcal:645,protein:63,carbs:75,fat:8},
            {emoji:"🍞",name:"Rugbrød m. tun & hytteost",time:"15:00",kcal:500,protein:48,carbs:45,fat:8},
            {emoji:"🍱",name:"Madkasse",time:"18:00",kcal:490,protein:44,carbs:50,fat:10},
            {emoji:"🥚",name:"2 hårdkogte æg",time:"20:00",kcal:140,protein:12,carbs:0,fat:10},
          ].map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:8}}>
              <span style={{fontSize:24}}>{m.emoji}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <p style={{fontSize:13,fontWeight:500,margin:0}}>{m.name}</p>
                  <span style={{fontSize:11,color:"#8E8E93"}}>{m.time}</span>
                </div>
                <p style={{fontSize:11,color:"#8E8E93",margin:"3px 0 0"}}>P: {m.protein}g · K: {m.carbs}g · F: {m.fat}g</p>
              </div>
              <span style={{fontSize:14,fontWeight:600,color:"#3B82F6"}}>{m.kcal}</span>
            </div>
          ))}
        </Card>

        <Card delay={80}>
          <p style={lbl}>Kalorieindtag – seneste dage</p>
          <ResponsiveContainer width="100%" height={150}>
            <BarChart data={DATA.filter(d=>d.kcal>0)}>
              <XAxis dataKey="date" tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false}/>
              <YAxis domain={[1400,2700]} tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false} width={35}/>
              <Tooltip content={<CTip/>}/>
              <ReferenceLine y={2000} stroke="#22C55E" strokeDasharray="3 3"/>
              <Bar isAnimationActive dataKey="kcal" fill="#3B82F6" fillOpacity={0.7} radius={[4,4,0,0]} name="Kcal" animationDuration={1200}/>
            </BarChart>
          </ResponsiveContainer>
          <p style={{fontSize:11,color:"#8E8E93",marginTop:6,textAlign:"right"}}>— Grøn linje = 2.000 kcal mål</p>
        </Card>

        <Card delay={160}>
          <p style={lbl}>Daglige makromål</p>
          {[["Kcal",1775,2000,"#3B82F6"],["Protein",167,167,"#22C55E"],["Kulhydrat",170,200,"#F59E0B"],["Fedt",36,60,"#A78BFA"]].map(([l,v,max,c])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderRadius:14,marginBottom:8}}>
              <div style={{position:"relative",width:48,height:48,flexShrink:0}}>
                <Ring pct={(v/max)*100} size={48} stroke={4} color={c}/>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:9,fontWeight:700,color:c}}>{Math.round((v/max)*100)}%</span>
                </div>
              </div>
              <div>
                <p style={{fontSize:11,color:"#8E8E93",margin:"0 0 2px"}}>{l}</p>
                <p style={{fontSize:15,fontWeight:600,margin:0}}>{v}<span style={{fontSize:11,color:"#8E8E93"}}>/{max}{l==="Kcal"?"":"g"}</span></p>
              </div>
            </div>
          ))}
        </Card>
      </div>}

      {/* GRAFER */}
      {tab==="grafer" && <div>
        <Card delay={0}>
          <p style={lbl}>Skridt</p>
          <ResponsiveContainer width="100%" height={150}>
            <BarChart data={DATA}>
              <XAxis dataKey="date" tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false} width={40}/>
              <Tooltip content={<CTip/>}/>
              <ReferenceLine y={STEP_GOAL} stroke="#3B82F6" strokeDasharray="3 3"/>
              <Bar isAnimationActive dataKey="steps" fill="#3B82F6" fillOpacity={0.7} radius={[4,4,0,0]} name="Skridt" animationDuration={1200}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card delay={80}>
          <p style={lbl}>Søvn & Energi</p>
          <ResponsiveContainer width="100%" height={150}>
            <LineChart data={DATA}>
              <XAxis dataKey="date" tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false}/>
              <YAxis domain={[0,10]} tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false} width={20}/>
              <Tooltip content={<CTip/>}/>
              <Line isAnimationActive type="monotone" dataKey="sleep" stroke="#818cf8" strokeWidth={2} dot={false} name="Søvn" animationDuration={1400}/>
              <Line isAnimationActive type="monotone" dataKey="energy" stroke="#22C55E" strokeWidth={2} dot={false} name="Energi" animationDuration={1600}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
        <Card delay={160}>
          <p style={lbl}>Humør & Stress</p>
          <ResponsiveContainer width="100%" height={150}>
            <LineChart data={DATA}>
              <XAxis dataKey="date" tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false}/>
              <YAxis domain={[0,10]} tick={{fill:"#8E8E93",fontSize:9}} axisLine={false} tickLine={false} width={20}/>
              <Tooltip content={<CTip/>}/>
              <Line isAnimationActive type="monotone" dataKey="mood" stroke="#F59E0B" strokeWidth={2} dot={false} name="Humør" animationDuration={1400}/>
              <Line isAnimationActive type="monotone" dataKey="stress" stroke="#f87171" strokeWidth={2} dot={false} name="Stress" animationDuration={1600}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>}

      {/* COACH */}
      {tab==="coach" && <div>
        <Card delay={0} glow>
          <p style={lbl}>Din coach</p>
          <p style={{fontSize:17,lineHeight:1.7,color:"rgba(255,255,255,0.9)",margin:"0 0 16px",minHeight:80}}>
            "{cTyped}{!cDone?<span style={{borderRight:"2px solid #3B82F6",animation:"blink 1s step-end infinite"}}>&nbsp;</span>:""}"
          </p>
          <Btn small onClick={()=>setCoach(COACH_MSGS[Math.floor(Math.random()*COACH_MSGS.length)])}>Ny besked →</Btn>
        </Card>
        <Card delay={120}>
          <p style={lbl}>Sandheder</p>
          {[["💧","Dagens vægt er vand, ikke fedt.","Kroppen svinger 1-2 kg dagligt. Kig på ugetrenden."],
            ["📈","Trenden er det eneste der tæller.","En hård weekend ødelægger ikke uger med arbejde."],
            ["💊","Duloxetin udtrapning er reel.","Det du mærker er kemien, ikke dig. Det aftager."],
            ["🧠","Bevægelse er medicin mod angst.","Daglig gang reducerer kortisol."],
            ["❤️","Du møder altid op for Arik.","Selv på de hårdeste dage. Det er den stærkeste far."]
          ].map(([icon,title,body])=>(
            <div key={title} style={{display:"flex",gap:12,padding:"12px 14px",background:"rgba(255,255,255,0.03)",borderRadius:14,marginBottom:8}}>
              <span style={{fontSize:20}}>{icon}</span>
              <div>
                <p style={{fontSize:13,fontWeight:500,margin:"0 0 2px"}}>{title}</p>
                <p style={{fontSize:12,color:"#8E8E93",margin:0}}>{body}</p>
              </div>
            </div>
          ))}
        </Card>
      </div>}

      {/* STATS */}
      {tab==="stats" && <div>
        <Card delay={0}>
          <p style={lbl}>7-dages gennemsnit</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              ["Skridt",Math.round(DATA.slice(-7).reduce((s,c)=>s+(c.steps||0),0)/7).toLocaleString()],
              ["Søvn",(DATA.slice(-7).reduce((s,c)=>s+c.sleep,0)/7).toFixed(1)+"/10"],
              ["Energi",(DATA.slice(-7).reduce((s,c)=>s+c.energy,0)/7).toFixed(1)+"/10"],
              ["Humør",(DATA.slice(-7).reduce((s,c)=>s+c.mood,0)/7).toFixed(1)+"/10"],
            ].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16}}>
                <p style={{fontSize:11,color:"#8E8E93",margin:"0 0 4px"}}>{l}</p>
                <p style={{fontSize:22,fontWeight:600,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>
        <Card delay={80}>
          <p style={lbl}>Alt siden start</p>
          {[
            ["Check-ins",DATA.length],
            ["Dage siden start",15],
            ["Samlet tabt",`${totalLost} kg`],
            ["Laveste vægt",`${Math.min(...DATA.map(d=>d.weight))} kg`],
            ["BMI",(latest.weight/(1.86*1.86)).toFixed(1)],
            ["Total skridt",DATA.reduce((s,c)=>s+(c.steps||0),0).toLocaleString()],
          ].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:14,color:"#8E8E93"}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </Card>
      </div>}

    </div>

    {/* Bottom nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{maxWidth:600,margin:"0 auto",display:"flex"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"12px 4px 14px",border:"none",background:"none",cursor:"pointer",
            color:tab===t.id?"#3B82F6":"#8E8E93",
            fontSize:10,fontWeight:tab===t.id?600:400,
            transition:"all 0.2s ease",
            transform:tab===t.id?"scale(1.05)":"scale(1)",
          }}>
            <div style={{fontSize:18,marginBottom:2}}>{t.icon}</div>
            {t.label}
          </button>
        ))}
      </div>
    </div>

    <style>{`
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      *{-webkit-font-smoothing:antialiased}
    `}</style>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
