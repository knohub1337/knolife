// SVG Line Chart
function LineChart({data,keys,colors,height=140,yMin,yMax}){
  const [tooltip,setTooltip]=useState(null);
  const w=340,h=height,pad={t:10,r:10,b:24,l:32};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const vals=data.map(d=>keys.map(k=>d[k])).flat().filter(v=>v!=null);
  const mn=yMin??Math.min(...vals)-0.5;
  const mx=yMax??Math.max(...vals)+0.5;
  const x=i=>pad.l+i*(iw/(data.length-1));
  const y=v=>pad.t+ih-(v-mn)/(mx-mn)*ih;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(t=>{
        const yy=pad.t+t*ih;
        const val=(mx-t*(mx-mn)).toFixed(1);
        return <g key={t}>
          <line x1={pad.l} y1={yy} x2={w-pad.r} y2={yy} stroke="rgba(255,255,255,0.05)" strokeWidth={1}/>
          <text x={pad.l-4} y={yy+4} fill="#8E8E93" fontSize={9} textAnchor="end">{val}</text>
        </g>;
      })}
      {/* X labels */}
      {data.filter((_,i)=>i%3===0).map((d,i,arr)=>{
        const origIdx=DATA.indexOf(d)>=0?DATA.indexOf(d):i*3;
        return <text key={i} x={x(origIdx)} y={h-4} fill="#8E8E93" fontSize={9} textAnchor="middle">{d.date}</text>;
      })}
      {/* Lines */}
      {keys.map((k,ki)=>{
        const pts=data.map((d,i)=>`${x(i)},${y(d[k])}`).join(" ");
        return <polyline key={k} points={pts} fill="none" stroke={colors[ki]} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>;
      })}
      {/* Area for first key */}
      {keys.length===1&&(()=>{
        const pts=data.map((d,i)=>`${x(i)},${y(d[keys[0]])}`).join(" ");
        const apts=`${pad.l},${pad.t+ih} ${pts} ${x(data.length-1)},${pad.t+ih}`;
        return <polygon points={apts} fill={colors[0]} fillOpacity={0.12}/>;
      })()}
      {tooltip&&<>
        <line x1={tooltip.x} y1={pad.t} x2={tooltip.x} y2={pad.t+ih} stroke="rgba(255,255,255,0.15)" strokeWidth={1} strokeDasharray="3 2"/>
        {keys.map((k,ki)=><circle key={k} cx={tooltip.x} cy={y(tooltip.d[k])} r={4} fill={colors[ki]} stroke="#000" strokeWidth={2}/>)}
        <rect x={Math.min(tooltip.x+8,w-80)} y={pad.t} width={72} height={keys.length*16+10} rx={6} fill="#1a1a2e" stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>
        <text x={Math.min(tooltip.x+12,w-76)} y={pad.t+14} fill="#8E8E93" fontSize={9}>{tooltip.d.date}</text>
        {keys.map((k,ki)=><text key={k} x={Math.min(tooltip.x+12,w-76)} y={pad.t+26+ki*14} fill={colors[ki]} fontSize={10} fontWeight="600">{tooltip.d[k]}</text>)}
      </>}
    </svg>
  );
}

// SVG Bar Chart
function BarChart({data,dataKey,color,height=130,refLine}){
  const [tooltip,setTooltip]=useState(null);
  const w=340,h=height,pad={t:10,r:10,b:24,l:36};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const vals=data.map(d=>d[dataKey]).filter(v=>v>0);
  const mx=Math.max(...vals)*1.1;
  const mn=0;
  const bw=Math.max(4,(iw/data.length)-2);
  const y=v=>pad.t+ih-(v-mn)/(mx-mn)*ih;
  const refY=refLine?y(refLine):null;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}}>
      {[0,0.5,1].map(t=>{
        const yy=pad.t+t*ih;
        const val=Math.round(mx-t*mx).toLocaleString();
        return <g key={t}>
          <line x1={pad.l} y1={yy} x2={w-pad.r} y2={yy} stroke="rgba(255,255,255,0.05)" strokeWidth={1}/>
          <text x={pad.l-4} y={yy+4} fill="#8E8E93" fontSize={8} textAnchor="end">{val}</text>
        </g>;
      })}
      {refY&&<line x1={pad.l} y1={refY} x2={w-pad.r} y2={refY} stroke="#22C55E" strokeWidth={1.5} strokeDasharray="4 3"/>}
      {data.map((d,i)=>{
        const v=d[dataKey]||0;
        const bh=v>0?(v-mn)/(mx-mn)*ih:0;
        const bx=pad.l+i*(iw/data.length)+(iw/data.length-bw)/2;
        const by=y(v);
        return <g key={i}>
          <rect x={bx} y={by} width={bw} height={bh} fill={color} fillOpacity={0.75} rx={3}/>
          {i%3===0&&<text x={bx+bw/2} y={h-4} fill="#8E8E93" fontSize={8} textAnchor="middle">{d.date}</text>}
        </g>;
      })}
      {tooltip&&<>
        <rect x={Math.min(pad.l+tooltip.i*(iw/data.length),w-80)} y={pad.t} width={70} height={28} rx={6} fill="#1a1a2e" stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>
        <text x={Math.min(pad.l+tooltip.i*(iw/data.length)+6,w-74)} y={pad.t+12} fill="#8E8E93" fontSize={9}>{tooltip.d.date}</text>
        <text x={Math.min(pad.l+tooltip.i*(iw/data.length)+6,w-74)} y={pad.t+24} fill={color} fontSize={11} fontWeight="600">{(tooltip.d[dataKey]||0).toLocaleString()}</text>
      </>}
    </svg>
  );
}

// Progress Ring
function Ring({pct,size=80,stroke=5,color="#3B82F6"}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  const [off,setOff]=useState(circ);
  useEffect(()=>{setTimeout(()=>setOff(circ-(Math.min(100,pct)/100)*circ),400);},[pct,circ]);
  return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
      strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
      style={{transition:"stroke-dashoffset 1.4s cubic-bezier(0.34,1.56,0.64,1)"}}/>
  </svg>;
}

function Card({children,delay=0,glow=false}){
  const [hov,setHov]=useState(false);
  const [vis,setVis]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay);return()=>clearTimeout(t);},[delay]);
  return <div 
    onMouseEnter={()=>setHov(true)} 
    onMouseLeave={()=>setHov(false)}
    style={{
      background:"#0A0A0A",
      border:`1px solid rgba(255,255,255,${hov?0.12:0.07})`,
      borderRadius:24,padding:20,marginBottom:12,
      opacity:vis?1:0,
      transform:vis?(hov?"translateY(-3px) scale(1.005)":"translateY(0)"):"translateY(16px)",
      transition:"all 0.35s cubic-bezier(0.34,1.56,0.64,1)",
      boxShadow:glow?"0 0 30px rgba(59,130,246,0.15), 0 8px 32px rgba(0,0,0,0.5)":hov?"0 12px 40px rgba(0,0,0,0.6)":"0 2px 12px rgba(0,0,0,0.4)",
      cursor:"default"
  }}>{children}</div>;
}

function Btn({children,onClick,primary=false,small=false}){
  const [p,setP]=useState(false);
  const [h,setH]=useState(false);
  return <button 
    onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)} 
    onMouseEnter={()=>setH(true)} onMouseLeave={()=>{setH(false);setP(false);}}
    onClick={onClick} style={{
    background:primary?(h?"#60a5fa":"#3B82F6"):(h?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.07)"),
    border:primary?"none":"1px solid rgba(255,255,255,0.1)",
    borderRadius:50,color:primary?"#fff":"rgba(255,255,255,0.7)",
    padding:small?"6px 14px":"10px 20px",fontSize:small?12:14,
    fontWeight:500,cursor:"pointer",
    transform:p?"scale(0.93)":h?"scale(1.03)":"scale(1)",
    transition:"all 0.15s cubic-bezier(0.34,1.56,0.64,1)",
    boxShadow:p?"none":primary?"0 4px 16px rgba(59,130,246,0.3)":"none"
  }}>{children}</button>;
}

function useTypewriter(text,speed=22){
  const [d,setD]=useState("");const [done,setDone]=useState(false);
  useEffect(()=>{setD("");setDone(false);let i=0;const t=setInterval(()=>{i++;setD(text.slice(0,i));if(i>=text.length){clearInterval(t);setDone(true);}},speed);return()=>clearInterval(t);},[text]);
  return{d,done};
}

function CountUp({target,decimals=0,duration=1200}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    const start=Date.now();
    const tick=()=>{
      const p=Math.min(1,(Date.now()-start)/duration);
      const ease=1-Math.pow(1-p,3);
      setVal(+(target*ease).toFixed(decimals));
      if(p<1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  },[target]);
  return val.toFixed(decimals);
}

        <Card delay={0}>
          <p style={LBL}>Skridt</p>
          <BarChart data={DATA} dataKey="steps" color="#3B82F6" height={130} refLine={STEP_GOAL}/>
        </Card>
        <Card delay={80}>
          <p style={LBL}>Søvn & Energi</p>
          <LineChart data={DATA} keys={["sleep","energy"]} colors={["#818cf8","#22C55E"]} height={140} yMin={0} yMax={10}/>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <span style={{fontSize:11,color:"#818cf8"}}>● Søvn</span>
            <span style={{fontSize:11,color:"#22C55E"}}>● Energi</span>
          </div>
        </Card>
        <Card delay={160}>
          <p style={LBL}>Humør & Stress</p>
          <LineChart data={DATA} keys={["mood","stress"]} colors={["#F59E0B","#f87171"]} height={140} yMin={0} yMax={10}/>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <span style={{fontSize:11,color:"#F59E0B"}}>● Humør</span>
            <span style={{fontSize:11,color:"#f87171"}}>● Stress</span>
          </div>
        </Card>
      </div>}

      {tab==="coach"&&<div>
        <Card delay={0} glow>
          <p style={LBL}>Din coach</p>
          <p style={{fontSize:17,lineHeight:1.7,color:"rgba(255,255,255,0.9)",margin:"0 0 16px",minHeight:80}}>
            "{ct}{!cdone?<span style={{borderRight:"2px solid #3B82F6",animation:"blink 1s step-end infinite"}}>&nbsp;</span>:""}"
          </p>
          <Btn small onClick={()=>setCoach(COACH[Math.floor(Math.random()*COACH.length)])}>Ny besked →</Btn>
        </Card>
        <Card delay={120}>
          <p style={LBL}>Sandheder</p>
          {[["💧","Dagens vægt er vand, ikke fedt.","Kroppen svinger 1-2 kg dagligt. Kig på ugetrenden."],
            ["📈","Trenden er det eneste der tæller.","En hård weekend ødelægger ikke uger med arbejde."],
            ["💊","Duloxetin udtrapning er reel.","Det du mærker er kemien, ikke dig. Det aftager."],
            ["🧠","Bevægelse er medicin mod angst.","Daglig gang reducerer kortisol."],
            ["❤️","Du møder altid op for Arik.","Selv på de hårdeste dage. Det er den stærkeste far."]
          ].map(([icon,title,body])=>(
            <div key={title} style={{display:"flex",gap:12,padding:"12px 14px",background:"rgba(255,255,255,0.03)",borderRadius:14,marginBottom:8}}>
              <span style={{fontSize:20}}>{icon}</span>
              <div>
                <p style={{fontSize:13,fontWeight:500,margin:"0 0 2px"}}>{title}</p>
                <p style={{fontSize:12,color:"#8E8E93",margin:0}}>{body}</p>
              </div>
            </div>
          ))}
        </Card>
      </div>}

      {tab==="stats"&&<div>
        <Card delay={0}>
          <p style={LBL}>7-dages gennemsnit</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              ["Skridt",Math.round(DATA.slice(-7).reduce((s,c)=>s+(c.steps||0),0)/7).toLocaleString()],
              ["Søvn",(DATA.slice(-7).reduce((s,c)=>s+c.sleep,0)/7).toFixed(1)+"/10"],
              ["Energi",(DATA.slice(-7).reduce((s,c)=>s+c.energy,0)/7).toFixed(1)+"/10"],
              ["Humør",(DATA.slice(-7).reduce((s,c)=>s+c.mood,0)/7).toFixed(1)+"/10"],
            ].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16}}>
                <p style={{fontSize:11,color:"#8E8E93",margin:"0 0 4px"}}>{l}</p>
                <p style={{fontSize:22,fontWeight:600,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>
        <Card delay={80}>
          <p style={LBL}>Alt siden start</p>
          {[["Check-ins",DATA.length],["Dage siden start",15],["Samlet tabt",`${totalLost} kg`],["Laveste vægt",`${lowestW} kg`],["BMI",(latest.weight/(1.86*1.86)).toFixed(1)],["Total skridt",DATA.reduce((s,c)=>s+(c.steps||0),0).toLocaleString()]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:14,color:"#8E8E93"}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </Card>
      </div>}

    </div>

    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{maxWidth:600,margin:"0 auto",display:"flex"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"12px 4px 14px",border:"none",background:"none",cursor:"pointer",
            color:tab===t.id?"#3B82F6":"#8E8E93",fontSize:10,fontWeight:tab===t.id?600:400,
            transition:"all 0.2s ease",transform:tab===t.id?"scale(1.05)":"scale(1)"
          }}>
            <div style={{fontSize:18,marginBottom:2}}>{t.icon}</div>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
