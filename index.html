// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(d){return new Date(d).toLocaleDateString("da-DK",{day:"numeric",month:"short"});}
function loadCheckins(){try{const s=localStorage.getItem("knolife_v2");return s?JSON.parse(s):[];}catch{return[];}}
function saveCheckins(data){try{localStorage.setItem("knolife_v2",JSON.stringify(data));}catch{}}

// ── Typewriter ────────────────────────────────────────────────────────────────
function useTypewriter(text,speed=22){
  const [d,setD]=useState("");
  const [done,setDone]=useState(false);
  useEffect(()=>{
    setD("");setDone(false);
    let i=0;
    const t=setInterval(()=>{i++;setD(text.slice(0,i));if(i>=text.length){clearInterval(t);setDone(true);}},speed);
    return()=>clearInterval(t);
  },[text]);
  return{d,done};
}

// ── CountUp ───────────────────────────────────────────────────────────────────
function CountUp({target,decimals=0,duration=1200}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    const start=Date.now();
    const tick=()=>{
      const p=Math.min(1,(Date.now()-start)/duration);
      const ease=1-Math.pow(1-p,3);
      setVal(+(target*ease).toFixed(decimals));
      if(p<1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  },[target]);
  return val.toFixed(decimals);
}

// ── Progress Ring ─────────────────────────────────────────────────────────────
function Ring({pct,size=80,stroke=5,color="#3B82F6"}){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  const [off,setOff]=useState(circ);
  useEffect(()=>{setTimeout(()=>setOff(circ-(Math.min(100,pct)/100)*circ),400);},[pct,circ]);
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 1.4s cubic-bezier(0.34,1.56,0.64,1)"}}/>
    </svg>
  );
}

// ── Card ──────────────────────────────────────────────────────────────────────
function Card({children,delay=0,glow=false}){
  const [vis,setVis]=useState(false);
  const [hov,setHov]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setVis(true),delay);return()=>clearTimeout(t);},[delay]);
  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      background:"#0A0A0A",
      border:`1px solid rgba(255,255,255,${hov?0.12:0.07})`,
      borderRadius:24,padding:20,marginBottom:12,
      opacity:vis?1:0,
      transform:vis?(hov?"translateY(-3px) scale(1.005)":"translateY(0)"):"translateY(16px)",
      transition:"all 0.35s cubic-bezier(0.34,1.56,0.64,1)",
      boxShadow:glow?"0 0 30px rgba(59,130,246,0.15)":hov?"0 12px 40px rgba(0,0,0,0.6)":"0 2px 12px rgba(0,0,0,0.4)"
    }}>{children}</div>
  );
}

// ── Button ────────────────────────────────────────────────────────────────────
function Btn({children,onClick,primary=false,small=false,danger=false}){
  const [p,setP]=useState(false);
  const [h,setH]=useState(false);
  const bg=danger?"rgba(239,68,68,0.15)":primary?(h?"#60a5fa":"#3B82F6"):(h?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.06)");
  const border=danger?"1px solid rgba(239,68,68,0.3)":primary?"none":"1px solid rgba(255,255,255,0.08)";
  const color=danger?"#ef4444":primary?"#fff":"rgba(255,255,255,0.7)";
  return(
    <button onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>{setH(false);setP(false);}}
      onClick={onClick} style={{
        background:bg,border,borderRadius:50,color,
        padding:small?"6px 14px":"10px 20px",fontSize:small?12:14,
        fontWeight:500,cursor:"pointer",
        transform:p?"scale(0.92)":h?"scale(1.03)":"scale(1)",
        transition:"all 0.15s cubic-bezier(0.34,1.56,0.64,1)",
        boxShadow:p?"none":primary?"0 4px 16px rgba(59,130,246,0.3)":"none"
    }}>{children}</button>
  );
}

// ── Line Chart ────────────────────────────────────────────────────────────────
function LineChart({data,keys,colors,height=140,yMin,yMax}){
  const [tooltip,setTooltip]=useState(null);
  const pathRefs=useRef([]);
  const [drawn,setDrawn]=useState(false);

  useEffect(()=>{
    setTimeout(()=>{
      pathRefs.current.forEach(path=>{
        if(!path) return;
        const len=path.getTotalLength();
        path.style.strokeDasharray=len;
        path.style.strokeDashoffset=len;
        path.style.transition="stroke-dashoffset 1.4s cubic-bezier(0.4,0,0.2,1)";
        requestAnimationFrame(()=>{path.style.strokeDashoffset="0";});
      });
      setDrawn(true);
    },300);
  },[]);

  const w=340,h=height,pad={t:10,r:10,b:24,l:32};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const vals=data.map(d=>keys.map(k=>d[k])).flat().filter(v=>v!=null);
  const mn=yMin??Math.min(...vals)-0.5;
  const mx=yMax??Math.max(...vals)+0.5;
  const xi=i=>pad.l+i*(iw/(data.length-1));
  const yi=v=>pad.t+ih-(v-mn)/(mx-mn)*ih;

  const handleMove=(e)=>{
    const svg=e.currentTarget;
    const rect=svg.getBoundingClientRect();
    const mx2=(e.clientX-rect.left)*(w/rect.width);
    const idx=Math.max(0,Math.min(data.length-1,Math.round((mx2-pad.l)/(iw/(data.length-1)))));
    setTooltip({i:idx,x:xi(idx),d:data[idx]});
  };

  return(
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,cursor:"crosshair",overflow:"visible"}}
      onMouseMove={handleMove} onMouseLeave={()=>setTooltip(null)}>
      {[0,0.25,0.5,0.75,1].map(t=>{
        const yy=pad.t+t*ih;
        const val=(mx-t*(mx-mn)).toFixed(1);
        return <g key={t}>
          <line x1={pad.l} y1={yy} x2={w-pad.r} y2={yy} stroke="rgba(255,255,255,0.05)" strokeWidth={1}/>
          <text x={pad.l-4} y={yy+4} fill="#8E8E93" fontSize={9} textAnchor="end">{val}</text>
        </g>;
      })}
      {data.filter((_,i)=>i%3===0).map((d,_,__)=>{
        const origIdx=data.indexOf(d);
        return <text key={origIdx} x={xi(origIdx)} y={h-4} fill="#8E8E93" fontSize={9} textAnchor="middle">{fmtDate(d.date)}</text>;
      })}
      {keys.length===1&&(()=>{
        const pts=data.map((d,i)=>`${xi(i)},${yi(d[keys[0]])}`).join(" ");
        const apts=`${pad.l},${pad.t+ih} ${pts} ${xi(data.length-1)},${pad.t+ih}`;
        return <polygon points={apts} fill={colors[0]} fillOpacity={drawn?0.1:0} style={{transition:"fill-opacity 1s ease 0.8s"}}/>;
      })()}
      {keys.map((k,ki)=>{
        const pts=data.map((d,i)=>`${xi(i)},${yi(d[k])}`).join(" ");
        return <polyline key={k} ref={el=>pathRefs.current[ki]=el} points={pts} fill="none" stroke={colors[ki]} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>;
      })}
      {tooltip&&<>
        <line x1={tooltip.x} y1={pad.t} x2={tooltip.x} y2={pad.t+ih} stroke="rgba(255,255,255,0.2)" strokeWidth={1} strokeDasharray="3 2"/>
        {keys.map((k,ki)=><circle key={k} cx={tooltip.x} cy={yi(tooltip.d[k])} r={5} fill={colors[ki]} stroke="#000" strokeWidth={2}/>)}
        <rect x={Math.min(tooltip.x+10,w-82)} y={pad.t+2} width={76} height={keys.length*16+14} rx={7} fill="rgba(10,10,20,0.95)" stroke="rgba(255,255,255,0.12)" strokeWidth={1}/>
        <text x={Math.min(tooltip.x+16,w-76)} y={pad.t+15} fill="#8E8E93" fontSize={9}>{fmtDate(tooltip.d.date)}</text>
        {keys.map((k,ki)=><text key={k} x={Math.min(tooltip.x+16,w-76)} y={pad.t+28+ki*15} fill={colors[ki]} fontSize={11} fontWeight="700">{tooltip.d[k]}</text>)}
      </>}
    </svg>
  );
}

// ── Bar Chart ─────────────────────────────────────────────────────────────────
function BarChart({data,dataKey,color,height=130,refLine}){
  const [tooltip,setTooltip]=useState(null);
  const [progress,setProgress]=useState(0);

  useEffect(()=>{
    setTimeout(()=>{
      const start=Date.now(),dur=1200;
      const tick=()=>{
        const p=Math.min(1,(Date.now()-start)/dur);
        setProgress(1-Math.pow(1-p,3));
        if(p<1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    },300);
  },[]);

  const w=340,h=height,pad={t:10,r:10,b:24,l:36};
  const iw=w-pad.l-pad.r,ih=h-pad.t-pad.b;
  const vals=data.map(d=>d[dataKey]).filter(v=>v>0);
  if(!vals.length) return null;
  const mx=Math.max(...vals)*1.1;
  const bw=Math.max(4,(iw/data.length)-3);
  const yi=v=>pad.t+ih-(v/mx)*ih;
  const refY=refLine?yi(refLine):null;

  return(
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,overflow:"visible"}}>
      {[0,0.5,1].map(t=>{
        const yy=pad.t+t*ih;
        return <g key={t}>
          <line x1={pad.l} y1={yy} x2={w-pad.r} y2={yy} stroke="rgba(255,255,255,0.05)" strokeWidth={1}/>
          <text x={pad.l-4} y={yy+4} fill="#8E8E93" fontSize={8} textAnchor="end">{Math.round(mx-t*mx).toLocaleString()}</text>
        </g>;
      })}
      {refY&&<line x1={pad.l} y1={refY} x2={w-pad.r} y2={refY} stroke="#22C55E" strokeWidth={1.5} strokeDasharray="4 3"/>}
      {data.map((d,i)=>{
        const v=d[dataKey]||0;
        const fullH=v>0?(v/mx)*ih:0;
        const animH=fullH*progress;
        const bx=pad.l+i*(iw/data.length)+(iw/data.length-bw)/2;
        const isHov=tooltip&&tooltip.i===i;
        return <g key={i} onMouseEnter={()=>setTooltip({i,d})} onMouseLeave={()=>setTooltip(null)} style={{cursor:"pointer"}}>
          <rect x={bx} y={pad.t+ih-animH} width={bw} height={animH} fill={color} fillOpacity={isHov?1:0.7} rx={3} style={{transition:"fill-opacity 0.15s ease"}}/>
          {i%3===0&&<text x={bx+bw/2} y={h-4} fill="#8E8E93" fontSize={8} textAnchor="middle">{fmtDate(d.date)}</text>}
        </g>;
      })}
      {tooltip&&<>
        <rect x={Math.min(pad.l+tooltip.i*(iw/data.length),w-82)} y={pad.t} width={76} height={32} rx={7} fill="rgba(10,10,20,0.95)" stroke="rgba(255,255,255,0.12)" strokeWidth={1}/>
        <text x={Math.min(pad.l+tooltip.i*(iw/data.length)+8,w-74)} y={pad.t+14} fill="#8E8E93" fontSize={9}>{fmtDate(tooltip.d.date)}</text>
        <text x={Math.min(pad.l+tooltip.i*(iw/data.length)+8,w-74)} y={pad.t+27} fill={color} fontSize={11} fontWeight="700">{(tooltip.d[dataKey]||0).toLocaleString()}</text>
      </>}
    </svg>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("home");
  const [coachMsg,setCoachMsg]=useState(COACH[0]);
  const {d:ct,done:cdone}=useTypewriter(coachMsg);
  const [showForm,setShowForm]=useState(false);
  const [savedAnim,setSavedAnim]=useState(false);
  const [userCheckins,setUserCheckins]=useState(()=>loadCheckins());
  const [form,setForm]=useState({
    date:new Date().toISOString().split("T")[0],
    weight:"",sleep:7,energy:7,steps:"",training:false,mood:7,stress:5,notes:""
  });

  const allData=[...SEED_WITH_KCAL,...userCheckins]
    .reduce((acc,d)=>{const idx=acc.findIndex(x=>x.date===d.date);if(idx>=0)acc[idx]=d;else acc.push(d);return acc;},[])
    .sort((a,b)=>a.date.localeCompare(b.date));

  const latest=allData[allData.length-1];
  const totalLost=+(START-latest.weight).toFixed(1);
  const pct=Math.min(100,((START-latest.weight)/(START-TARGET))*100).toFixed(0);
  const lowestW=Math.min(...allData.map(d=>d.weight));
  const nextM=MILESTONES.find(m=>latest.weight>m);
  const kgNext=nextM?+(latest.weight-nextM).toFixed(1):0;

  function submitCheckin(){
    if(!form.weight) return;
    const entry={...form,weight:+form.weight,steps:+form.steps||0};
    const updated=[...userCheckins.filter(c=>c.date!==form.date),entry];
    setUserCheckins(updated);
    saveCheckins(updated);
    setSavedAnim(true);
    setTimeout(()=>{setSavedAnim(false);setShowForm(false);setForm(f=>({...f,weight:"",steps:"",notes:""}));},1400);
  }

  const tabs=[{id:"home",icon:"⬡",label:"Hjem"},{id:"grafer",icon:"◈",label:"Grafer"},{id:"stats",icon:"◇",label:"Stats"}];

  return <div style={{background:"#000",minHeight:"100vh",color:"#fff",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif"}}>
    <div style={{position:"fixed",top:-100,left:"50%",transform:"translateX(-50%)",width:500,height:400,background:"radial-gradient(circle,rgba(59,130,246,0.07) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1,maxWidth:600,margin:"0 auto",padding:"32px 16px 110px"}}>

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
        <div>
          <p style={{color:"#8E8E93",fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",margin:0}}>Knolife V2</p>
          <h1 style={{fontSize:28,fontWeight:700,margin:"2px 0 0",letterSpacing:"-0.5px"}}>Kno</h1>
        </div>
        <Btn primary onClick={()=>setShowForm(true)}>+ Log i dag</Btn>
      </div>

      {/* HOME */}
      {tab==="home"&&<div>
        <Card delay={0} glow>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
            <div>
              <p style={LBL}>Nuværende vægt</p>
              <div style={{display:"flex",alignItems:"flex-end",gap:6}}>
                <span style={{fontSize:56,fontWeight:700,letterSpacing:"-2px",lineHeight:1}}>
                  <CountUp target={latest.weight} decimals={1} duration={1400}/>
                </span>
                <span style={{fontSize:20,color:"#8E8E93",marginBottom:6}}>kg</span>
              </div>
              <span style={{fontSize:13,color:"#22C55E"}}>▼ {totalLost} kg tabt i alt</span>
            </div>
            <div style={{position:"relative",width:80,height:80}}>
              <Ring pct={+pct}/>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:15,fontWeight:700,color:"#3B82F6"}}>{pct}%</span>
                <span style={{fontSize:9,color:"#8E8E93"}}>mod mål</span>
              </div>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:11,color:"#8E8E93"}}>Start: {START} kg</span>
              <span style={{fontSize:11,color:"#8E8E93"}}>Mål: {TARGET} kg</span>
            </div>
            <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#3B82F6,#818cf8)",borderRadius:4,transition:"width 1.4s ease"}}/>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
            {[["Tabt",`${totalLost} kg`,"#22C55E"],["Laveste",`${lowestW} kg`,"#3B82F6"],["BMI",(latest.weight/(1.86*1.86)).toFixed(1),"#fff"],["Dage",allData.length,"#8E8E93"]].map(([l,v,c])=>(
              <div key={l} style={{textAlign:"center"}}>
                <p style={{fontSize:10,color:"#8E8E93",margin:"0 0 2px",textTransform:"uppercase"}}>{l}</p>
                <p style={{fontSize:16,fontWeight:600,color:c,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>

        <Card delay={80}>
          <p style={LBL}>Vægt over tid</p>
          <LineChart data={allData} keys={["weight"]} colors={["#3B82F6"]} height={160} yMin={111} yMax={116}/>
        </Card>

        {nextM&&<Card delay={160}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={LBL}>Næste milestone</p>
              <p style={{fontSize:28,fontWeight:700,margin:0,color:"#3B82F6"}}>{nextM} kg</p>
              <p style={{fontSize:13,color:"#8E8E93",margin:"4px 0 0"}}>{kgNext} kg tilbage</p>
            </div>
            <div style={{width:56,height:56,borderRadius:"50%",border:"2px solid #3B82F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,animation:"pulse 2s ease-in-out infinite"}}>🎯</div>
          </div>
        </Card>}

        <Card delay={240}>
          <p style={LBL}>Milestones</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {MILESTONES.map(m=>{
              const unlocked=latest.weight<=m,next=m===nextM;
              return <div key={m} style={{padding:"6px 14px",borderRadius:50,fontSize:13,fontWeight:500,
                background:unlocked?"rgba(34,197,94,0.12)":next?"rgba(59,130,246,0.12)":"rgba(255,255,255,0.04)",
                border:unlocked?"1px solid rgba(34,197,94,0.3)":next?"1px solid rgba(59,130,246,0.3)":"1px solid rgba(255,255,255,0.06)",
                color:unlocked?"#22C55E":next?"#3B82F6":"#8E8E93"}}>
                {unlocked?"✓ ":""}{m} kg
              </div>;
            })}
          </div>
        </Card>

        <Card delay={320}>
          <p style={LBL}>Seneste · {fmtDate(latest.date)}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {[["Søvn",`${latest.sleep}/10`],["Energi",`${latest.energy}/10`],["Skridt",(latest.steps||0).toLocaleString()],["Humør",`${latest.mood}/10`]].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"10px 8px",textAlign:"center"}}>
                <p style={{fontSize:10,color:"#8E8E93",margin:"0 0 3px"}}>{l}</p>
                <p style={{fontSize:15,fontWeight:600,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
          {latest.notes&&<p style={{marginTop:12,fontSize:12,color:"#8E8E93",fontStyle:"italic"}}>"{latest.notes}"</p>}
        </Card>
      </div>}

      {/* GRAFER */}
      {tab==="grafer"&&<div>
        <Card delay={0}>
          <p style={LBL}>Skridt</p>
          <BarChart data={allData} dataKey="steps" color="#3B82F6" height={130} refLine={STEP_GOAL}/>
          <p style={{fontSize:10,color:"#8E8E93",marginTop:6,textAlign:"right"}}>— Grøn linje = mål</p>
        </Card>
        <Card delay={80}>
          <p style={LBL}>Søvn & Energi</p>
          <LineChart data={allData} keys={["sleep","energy"]} colors={["#818cf8","#22C55E"]} height={140} yMin={0} yMax={10}/>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <span style={{fontSize:11,color:"#818cf8"}}>● Søvn</span>
            <span style={{fontSize:11,color:"#22C55E"}}>● Energi</span>
          </div>
        </Card>
        <Card delay={160}>
          <p style={LBL}>Humør & Stress</p>
          <LineChart data={allData} keys={["mood","stress"]} colors={["#F59E0B","#f87171"]} height={140} yMin={0} yMax={10}/>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <span style={{fontSize:11,color:"#F59E0B"}}>● Humør</span>
            <span style={{fontSize:11,color:"#f87171"}}>● Stress</span>
          </div>
        </Card>
      </div>}

      {/* STATS */}
      {tab==="stats"&&<div>
        <Card delay={0}>
          <p style={LBL}>7-dages gennemsnit</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              ["Skridt",Math.round(allData.slice(-7).reduce((s,c)=>s+(c.steps||0),0)/7).toLocaleString()],
              ["Søvn",(allData.slice(-7).reduce((s,c)=>s+c.sleep,0)/7).toFixed(1)+"/10"],
              ["Energi",(allData.slice(-7).reduce((s,c)=>s+c.energy,0)/7).toFixed(1)+"/10"],
              ["Humør",(allData.slice(-7).reduce((s,c)=>s+c.mood,0)/7).toFixed(1)+"/10"],
            ].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:16}}>
                <p style={{fontSize:11,color:"#8E8E93",margin:"0 0 4px"}}>{l}</p>
                <p style={{fontSize:22,fontWeight:600,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
        </Card>
        <Card delay={80}>
          <p style={LBL}>Alt siden start</p>
          {[
            ["Check-ins logget",allData.length],
            ["Dage siden start",Math.floor((new Date()-new Date(SEED[0].date))/86400000)],
            ["Samlet tabt",`${totalLost} kg`],
            ["Laveste",`${lowestW} kg`],
            ["BMI",(latest.weight/(1.86*1.86)).toFixed(1)],
            ["Total skridt",allData.reduce((s,c)=>s+(c.steps||0),0).toLocaleString()],
          ].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <span style={{fontSize:14,color:"#8E8E93"}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600}}>{v}</span>
            </div>
          ))}
        </Card>
      </div>}

    </div>

    {/* Bottom nav */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{maxWidth:600,margin:"0 auto",display:"flex"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"12px 4px 14px",border:"none",background:"none",cursor:"pointer",
            color:tab===t.id?"#3B82F6":"#8E8E93",fontSize:10,fontWeight:tab===t.id?600:400,
            transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)",
            transform:tab===t.id?"scale(1.1)":"scale(1)"
          }}>
            <div style={{fontSize:18,marginBottom:2}}>{t.icon}</div>
            {t.label}
          </button>
        ))}
      </div>
    </div>

    {/* Check-in modal */}
    {showForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(12px)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:16}}>
      <div style={{background:"#0A0A0A",border:"1px solid rgba(255,255,255,0.1)",borderRadius:28,width:"100%",maxWidth:500,padding:24,animation:"slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:18,fontWeight:600,margin:0}}>Dagens check-in</h2>
          <button onClick={()=>setShowForm(false)} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"#8E8E93",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16}}>×</button>
        </div>
        {savedAnim
          ?<div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:48}}>✅</div>
            <p style={{color:"#22C55E",marginTop:8,fontSize:16}}>Gemt!</p>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={{fontSize:11,color:"#8E8E93",display:"block",marginBottom:5}}>Dato</label>
                <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={INP}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"#8E8E93",display:"block",marginBottom:5}}>Vægt (kg)</label>
                <input type="number" step="0.1" placeholder="112.0" value={form.weight} onChange={e=>setForm(p=>({...p,weight:e.target.value}))} style={INP}/>
              </div>
            </div>
            {[{key:"sleep",label:"Søvn"},{key:"energy",label:"Energi"},{key:"mood",label:"Humør"},{key:"stress",label:"Stress"}].map(({key,label})=>(
              <div key={key}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <label style={{fontSize:11,color:"#8E8E93"}}>{label}</label>
                  <span style={{fontSize:11,color:"#fff"}}>{form[key]}/10</span>
                </div>
                <input type="range" min={1} max={10} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:+e.target.value}))}/>
              </div>
            ))}
            <div>
              <label style={{fontSize:11,color:"#8E8E93",display:"block",marginBottom:5}}>Skridt i går</label>
              <input type="number" placeholder="7000" value={form.steps} onChange={e=>setForm(p=>({...p,steps:e.target.value}))} style={INP}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,color:"#8E8E93"}}>Træning</span>
              <button onClick={()=>setForm(p=>({...p,training:!p.training}))} style={{
                padding:"5px 14px",borderRadius:50,fontSize:12,cursor:"pointer",
                border:form.training?"1px solid rgba(34,197,94,0.4)":"1px solid rgba(255,255,255,0.08)",
                background:form.training?"rgba(34,197,94,0.12)":"rgba(255,255,255,0.04)",
                color:form.training?"#22C55E":"#8E8E93",transition:"all 0.2s ease"
              }}>{form.training?"Ja ✓":"Nej"}</button>
            </div>
            <div>
              <label style={{fontSize:11,color:"#8E8E93",display:"block",marginBottom:5}}>Noter</label>
              <textarea placeholder="Hvordan gik dagen..." value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={2} style={{...INP,resize:"none"}}/>
            </div>
            <Btn primary onClick={submitCheckin}>Gem check-in</Btn>
          </div>
        }
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
